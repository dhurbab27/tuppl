---
deployment:
  tasks:
    - export DEPLOYPATH=/home/tuppsxpf/tuppl-web/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R src $DEPLOYPATH
    - /bin/cp -R public $DEPLOYPATH
    - /bin/cp -R prisma $DEPLOYPATH
    - /bin/cp -R scripts $DEPLOYPATH
    - /bin/cp -R uploads $DEPLOYPATH
    - /bin/cp package.json $DEPLOYPATH
    - /bin/cp package-lock.json $DEPLOYPATH
    - /bin/cp next.config.ts $DEPLOYPATH
    - /bin/cp prisma.config.ts $DEPLOYPATH
    - /bin/cp tsconfig.json $DEPLOYPATH
    - /bin/cp postcss.config.mjs $DEPLOYPATH
    - /bin/cp app.js $DEPLOYPATH
    - /bin/cp .env.example $DEPLOYPATH
    - /bin/cp README.md $DEPLOYPATH
    - /bin/mkdir -p $DEPLOYPATH/tmp
    - /bin/mkdir -p $DEPLOYPATH/uploads/resumes
    - /bin/touch $DEPLOYPATH/tmp/restart.txt
