services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tuppl
      MYSQL_USER: tuppl
      MYSQL_PASSWORD: tupplpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    volumes:
      - /mnt/mainpool/apps/tuppl/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s
    networks:
      - tuppl

  web:
    image: ghcr.io/dhurbab27/tuppl:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3123:3123"
    environment:
      NODE_ENV: production
      PORT: "3123"
      HOSTNAME: "0.0.0.0"
      # MUST be db:3306 — never the host-mapped 3308
      DATABASE_URL: mysql://tuppl:tupplpass@db:3306/tuppl
      NEXTAUTH_SECRET: change-me-to-a-long-random-string
      NEXTAUTH_URL: http://localhost:3123
      ADMIN_EMAIL: admin@tuppl.com
      ADMIN_PASSWORD: Admin123!
      CONTACT_TO: info@tuppl.com
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: Tuppl <noreply@tuppl.com>
      SEED_ON_START: "true"
    volumes:
      - /mnt/mainpool/apps/tuppl/uploads:/app/uploads
    networks:
      - tuppl

networks:
  tuppl:
    driver: bridge
