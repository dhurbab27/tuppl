services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tuppl
      POSTGRES_USER: tuppl
      POSTGRES_PASSWORD: tupplpass
    ports:
      - "5433:5432"
    volumes:
      - /mnt/mainpool/apps/tuppl/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuppl -d tuppl"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - tuppl

  web:
    image: ghcr.io/dhurbab27/tuppl:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3123:3123"
    environment:
      NODE_ENV: production
      PORT: "3123"
      HOSTNAME: "0.0.0.0"
      # Use service name + container port 5432 (NOT the host-mapped 5433)
      DATABASE_URL: postgresql://tuppl:tupplpass@db:5432/tuppl?schema=public
      NEXTAUTH_SECRET: change-me-to-a-long-random-string
      NEXTAUTH_URL: http://localhost:3123
      ADMIN_EMAIL: admin@tuppl.com
      ADMIN_PASSWORD: Admin123!
      CONTACT_TO: info@tuppl.com
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: Tuppl <noreply@tuppl.com>
      SEED_ON_START: "true"
    volumes:
      - /mnt/mainpool/apps/tuppl/uploads:/app/uploads
    networks:
      - tuppl

networks:
  tuppl:
    driver: bridge
